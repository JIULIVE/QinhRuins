# QinhRuins 内容包目录 / Content Pack Catalog
# 这个文件被 /qr catalog 读取（默认地址：config.yml -> content.catalog-url）。
# 服主用 /qr download <id> 即可一键下载并安装下面登记的内容包。
#
# This file is read by /qr catalog (default URL: config.yml -> content.catalog-url).
# Server owners install any pack below with /qr download <id>.
#
# 每个内容包是一个 .zip，解压后顶层目录与插件数据目录对应（白名单）：
#   templates/  generators/  palettes/  loottables/  blueprints/  sections/  lang/  affixes.yml
# 可在 zip 根放一个 pack.yml 标注元数据：
#   id: medieval-ruins
#   name: 中世纪遗迹包
#   version: 2
#
# Each pack is a .zip whose top-level folders mirror the plugin data folder (whitelisted):
#   templates/ generators/ palettes/ loottables/ blueprints/ sections/ lang/ affixes.yml
# You may put a pack.yml at the zip root with id/name/version metadata.

packs: {}
  # 示例 / example —— 取消注释并填上真实的 release 直链即可：
  #
  # medieval-ruins:
  #   name: "中世纪遗迹包 Medieval Ruins"
  #   version: 1
  #   author: "JiuLive"
  #   description: "一组中世纪西式废墟（塔楼 / 城门 / 地穴）"
  #   size: "2.3 MB"
  #   url: "https://github.com/JIULIVE/QinhRuins/releases/download/packs/medieval-ruins.zip"
  #
  # sky-temples:
  #   name: "天空神殿 Sky Temples"
  #   version: 1
  #   author: "JiuLive"
  #   description: "漂浮在云端的神殿遗迹，配套词缀与战利品"
  #   size: "4.1 MB"
  #   url: "https://github.com/JIULIVE/QinhRuins/releases/download/packs/sky-temples.zip"
